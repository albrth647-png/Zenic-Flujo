<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Letter Queue — Workflow Determinista</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% include 'navbar.html' %}
    <main class="container">
        <div class="page-header">
            <h1>⚠️ Dead Letter Queue</h1>
            <div class="page-header-actions">
                <button class="btn btn-primary" onclick="retryAll()">🔄 Reintentar Todas</button>
                <button class="btn btn-danger" onclick="discardAll()">🗑️ Descartar Todas</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="dlStats">
            <div class="stat-card error fade-in"><div class="stat-value" id="dlPending">-</div><div class="stat-label">Pendientes</div></div>
            <div class="stat-card fade-in"><div class="stat-value" id="dlTotal">-</div><div class="stat-label">Total</div></div>
            <div class="stat-card active fade-in"><div class="stat-value" id="dlResolved">-</div><div class="stat-label">Resueltas</div></div>
            <div class="stat-card paused fade-in"><div class="stat-value" id="dlDiscarded">-</div><div class="stat-label">Descartadas</div></div>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
            <select id="filterStatus" onchange="loadDeadLetters()">
                <option value="">Todos los estados</option>
                <option value="pending">⏳ Pendientes</option>
                <option value="retrying">🔄 Reintentando</option>
                <option value="resolved">✅ Resueltas</option>
                <option value="discarded">🗑️ Descartadas</option>
            </select>
            <input type="number" id="filterWorkflowId" placeholder="Workflow ID" min="0" style="width:140px" onchange="loadDeadLetters()">
            <span class="text-muted" id="dlCountInfo"></span>
        </div>

        <!-- Dead Letter Table -->
        <div class="table-responsive">
            <table class="table" id="dlTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Workflow</th>
                        <th>Paso</th>
                        <th>Tool</th>
                        <th>Error</th>
                        <th>Reintentos</th>
                        <th>Estado</th>
                        <th>Creado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="dlBody">
                    <tr><td colspan="9" class="text-center"><span class="spinner-lg"></span> Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="/static/app.js"></script>
    <script>
        let dlData = [];

        function loadDeadLetters() {
            const status = document.getElementById('filterStatus').value;
            const workflowId = document.getElementById('filterWorkflowId').value;
            let url = '/api/dead-letter?limit=100';
            if (status) url += '&status=' + encodeURIComponent(status);
            if (workflowId) url += '&workflow_id=' + parseInt(workflowId);

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    dlData = data.entries || [];
                    renderTable(dlData);
                    renderStats(data.stats || {});
                    document.getElementById('dlCountInfo').textContent =
                        dlData.length + ' entrada(s)';
                })
                .catch(err => {
                    document.getElementById('dlBody').innerHTML =
                        '<tr><td colspan="9" class="text-error">Error cargando: ' + err + '</td></tr>';
                });
        }

        function renderTable(entries) {
            const tbody = document.getElementById('dlBody');
            if (!entries.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">✨ No hay entradas</td></tr>';
                return;
            }

            tbody.innerHTML = entries.map(e => {
                const statusClass = {
                    'pending': 'status-pending',
                    'retrying': 'status-retrying',
                    'resolved': 'status-resolved',
                    'discarded': 'status-discarded',
                }[e.status] || '';

                const statusIcon = {
                    'pending': '⏳', 'retrying': '🔄',
                    'resolved': '✅', 'discarded': '🗑️',
                }[e.status] || '❓';

                const created = e.created_at ? new Date(e.created_at + 'Z').toLocaleString() : '-';
                const errorMsg = e.error_message
                    ? (e.error_message.length > 80 ? e.error_message.slice(0, 80) + '...' : e.error_message)
                    : '-';

                let actions = '';
                if (e.status === 'pending') {
                    actions = `
                        <button class="btn btn-sm btn-primary" onclick="retryEntry(${e.id})">🔄</button>
                        <button class="btn btn-sm btn-danger" onclick="discardEntry(${e.id})">🗑️</button>
                    `;
                } else if (e.status === 'retrying') {
                    actions = `<span class="text-muted">Reintentando...</span>`;
                } else if (e.status === 'resolved') {
                    actions = `<span class="text-success">Resuelto</span>`;
                } else {
                    actions = `<span class="text-muted">Descartado</span>`;
                }

                return `<tr>
                    <td><strong>#${e.id}</strong></td>
                    <td>${escHtml(e.workflow_name)} <small class="text-muted">(ID: ${e.workflow_id})</small></td>
                    <td>${e.step_id}</td>
                    <td><code>${escHtml(e.tool)}.${escHtml(e.action)}</code></td>
                    <td title="${escHtml(e.error_message)}"><small class="text-error">${escHtml(errorMsg)}</small></td>
                    <td>${e.retry_count}</td>
                    <td><span class="badge ${statusClass}">${statusIcon} ${e.status}</span></td>
                    <td><small>${created}</small></td>
                    <td class="actions-cell">${actions}</td>
                </tr>`;
            }).join('');
        }

        function renderStats(stats) {
            document.getElementById('dlPending').textContent = (stats.by_status && stats.by_status.pending) || 0;
            document.getElementById('dlTotal').textContent = stats.total || 0;
            document.getElementById('dlResolved').textContent = (stats.by_status && stats.by_status.resolved) || 0;
            document.getElementById('dlDiscarded').textContent = (stats.by_status && stats.by_status.discarded) || 0;
        }

        function retryEntry(id) {
            fetch('/api/dead-letter/' + id + '/retry', { method: 'POST' })
                .then(r => r.json())
                .then(() => loadDeadLetters())
                .catch(err => alert('Error: ' + err));
        }

        function discardEntry(id) {
            if (!confirm('¿Descartar entrada #' + id + '?')) return;
            fetch('/api/dead-letter/' + id + '/discard', { method: 'POST' })
                .then(r => r.json())
                .then(() => loadDeadLetters())
                .catch(err => alert('Error: ' + err));
        }

        function retryAll() {
            if (!confirm('¿Reintentar TODAS las entradas pendientes?')) return;
            fetch('/api/dead-letter/retry-all', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert(data.resolved + '/' + data.total + ' resueltas');
                    loadDeadLetters();
                })
                .catch(err => alert('Error: ' + err));
        }

        function discardAll() {
            if (!confirm('¿Descartar TODAS las entradas pendientes?')) return;
            fetch('/api/dead-letter/discard-all', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert(data.discarded + ' entradas descartadas');
                    loadDeadLetters();
                })
                .catch(err => alert('Error: ' + err));
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Load on page load
        loadDeadLetters();
    </script>
</body>
</html>
