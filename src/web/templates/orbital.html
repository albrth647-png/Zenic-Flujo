<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espectro Orbital — WFD</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% include 'navbar.html' %}
    <main class="container">
        <div class="page-header">
            <h1>🌀 Espectro Orbital</h1>
            <div class="page-header-actions">
                <button onclick="startVisualizer()" class="btn btn-primary">▶️ Iniciar</button>
                <button onclick="stopVisualizer()" class="btn btn-secondary">⏹ Detener</button>
                <button onclick="refreshData()" class="btn btn-secondary">🔄 Actualizar</button>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card chart-card-wide">
                <h3 class="chart-title">🌌 Ciclo ORBITAL en vivo</h3>
                <div class="chart-wrapper" style="height:400px">
                    <canvas id="orbitalCanvas"></canvas>
                </div>
            </div>
        </div>

        <div class="dashboard-bottom-grid">
            <div class="section">
                <h2>📊 Variables Orbitales</h2>
                <div class="executions-list" id="variablesList">
                    <p class="loading">Cargando...</p>
                </div>
            </div>
            <div class="section">
                <h2>⚡ Tensiones TOR</h2>
                <div class="executions-list" id="torList">
                    <p class="loading">Cargando...</p>
                </div>
            </div>
            <div class="section">
                <h2>🎯 Resonancia RCC</h2>
                <div class="executions-list" id="rccList">
                    <p class="loading">Cargando...</p>
                </div>
            </div>
            <div class="section">
                <h2>📈 Estado COD</h2>
                <div class="section-card" id="codStatus">
                    <p style="color:var(--text-muted)">Ejecuta un tick orbital para ver el estado</p>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>🔧 Acciones</h2>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
                <button onclick="runTick()" class="btn btn-primary">▶️ Ejecutar Tick</button>
                <button onclick="runTicks()" class="btn btn-secondary">▶️▶️ 10 Ticks</button>
                <button onclick="addVariables()" class="btn btn-secondary">➕ Añadir Variables</button>
                <button onclick="resetSystem()" class="btn btn-danger">🔄 Reset Sistema</button>
            </div>
            <div id="tickResult" class="test-result hidden" style="margin-top:16px"></div>
        </div>
    </main>
    <script src="/static/app.js"></script>
    <script src="/static/orbital-visualizer.js"></script>
    <script>
    let visualizer = null;

    async function loadOrbitalStatus() {
        try {
            const res = await fetch('/api/orbital/status');
            if (!res.ok) return;
            const data = await res.json();

            // Variables
            const vList = document.getElementById('variablesList');
            if (data.variables) {
                const vars = Object.entries(data.variables);
                vList.innerHTML = vars.map(([name, v]) => `
                    <div class="execution-item">
                        <span class="execution-name">🌀 ${name}</span>
                        <span style="font-size:.85rem;color:var(--text-muted)">
                            θ=${(v.theta % (2*Math.PI)).toFixed(4)} · A=${v.amplitude} · v=${v.velocity}
                        </span>
                        <span style="font-size:.85rem">Valor: ${(v.value || 0).toFixed(4)}</span>
                    </div>
                `).join('') || '<p class="loading">Sin variables orbitales</p>';
            }

            // TOR
            const tList = document.getElementById('torList');
            if (data.tor) {
                tList.innerHTML = data.tor.map(t => {
                    const cls = (t.tor_value || 0) >= 0 ? 'completed' : 'failed';
                    return `<div class="execution-item">
                        <span class="execution-name" style="font-size:.85rem">TOR(${t.variable_i}, ${t.variable_j})</span>
                        <span class="execution-status ${cls}">${(t.tor_value || 0).toFixed(4)}</span>
                        <span style="font-size:.8rem;color:var(--text-muted)">align=${(t.alignment || 0).toFixed(4)}</span>
                    </div>`;
                }).join('') || '<p class="loading">Sin datos TOR</p>';
            }

            // RCC
            const rList = document.getElementById('rccList');
            if (data.rcc) {
                rList.innerHTML = data.rcc.map(r => `
                    <div class="execution-item">
                        <span class="execution-name" style="font-size:.85rem">🎯 ${r.cycle_name || 'Ciclo'}</span>
                        <span class="${r.is_resonant ? 'status-badge active' : 'status-badge paused'}">
                            ${r.is_resonant ? '★ Resonante' : '○ No resonante'}
                        </span>
                        <span style="font-size:.8rem;color:var(--text-muted)">Fuerza: ${(r.strength || 0).toFixed(4)}</span>
                    </div>
                `).join('') || '<p class="loading">Sin datos RCC</p>';
            }

            // COD
            const codDiv = document.getElementById('codStatus');
            if (data.cod) {
                codDiv.innerHTML = data.cod.map(c => `
                    <div class="info-row">
                        <span class="info-label">Ciclo ${c.cycle_id || ''}</span>
                        <span class="info-value ${c.converged ? 'status-badge active' : 'status-badge failed'}">
                            ${c.converged ? '✅ Convergió' : '❌ No convergió'}
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Iteraciones</span>
                        <span class="info-value">${c.iterations || 0}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Delta final</span>
                        <span class="info-value">${(c.convergence_delta || 0).toFixed(8)}</span>
                    </div>
                `).join('') || '<p style="color:var(--text-muted)">Sin datos COD</p>';
            }

            // TOR cache stats
            if (data.tor_cache) {
                const cacheRow = document.createElement('div');
                cacheRow.className = 'section-card';
                cacheRow.style.marginTop = '16px';
                cacheRow.innerHTML = `
                    <h2>💾 Cache TOR</h2>
                    <div class="info-row"><span class="info-label">Hit rate</span><span class="info-value">${(data.tor_cache.hit_rate * 100).toFixed(1)}%</span></div>
                    <div class="info-row"><span class="info-label">Hits/Misses</span><span class="info-value">${data.tor_cache.hits}/${data.tor_cache.misses}</span></div>
                    <div class="info-row"><span class="info-label">Tamaño cache</span><span class="info-value">${data.tor_cache.cache_size} entradas</span></div>
                `;
                document.querySelector('.dashboard-bottom-grid').appendChild(cacheRow);
            }
        } catch (e) {
            console.error('Error loading orbital status:', e);
        }
    }

    async function runTick() {
        const btn = event.target;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Ejecutando...';
        try {
            const res = await fetch('/api/orbital/tick', {method: 'POST'});
            const data = await res.json();
            const div = document.getElementById('tickResult');
            div.classList.remove('hidden');
            if (res.ok) {
                div.className = 'test-result test-success';
                div.innerHTML = `✅ Tick #${data.tick} completado en ${data.duration_ms}ms`;
            } else {
                div.className = 'test-result test-error';
                div.innerHTML = `❌ Error: ${data.error || 'desconocido'}`;
            }
            loadOrbitalStatus();
        } catch (e) {
            showToast('Error de conexión', 'error');
        }
        btn.disabled = false;
        btn.textContent = '▶️ Ejecutar Tick';
    }

    async function runTicks() {
        const btn = event.target;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Ejecutando...';
        for (let i = 0; i < 10; i++) {
            await fetch('/api/orbital/tick', {method: 'POST'});
        }
        const div = document.getElementById('tickResult');
        div.classList.remove('hidden');
        div.className = 'test-result test-success';
        div.innerHTML = '✅ 10 ticks ejecutados';
        loadOrbitalStatus();
        btn.disabled = false;
        btn.textContent = '▶️▶️ 10 Ticks';
    }

    async function addVariables() {
        const names = ['Demanda', 'Precio', 'Oferta', 'Inflacion', 'Confianza'];
        for (const name of names) {
            await fetch('/api/orbital/variable', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name, theta: Math.random() * Math.PI * 2,
                    amplitude: 10 + Math.random() * 50,
                    velocity: 0.05 + Math.random() * 0.15
                })
            });
        }
        // Create a cycle
        await fetch('/api/orbital/cycle', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: 'Economico', variables: names, threshold: 0.5})
        });
        loadOrbitalStatus();
        showToast('✅ Variables orbitales añadidas', 'success');
    }

    async function resetSystem() {
        await fetch('/api/orbital/reset', {method: 'POST'});
        loadOrbitalStatus();
        showToast('🔄 Sistema orbital reseteado', 'info');
    }

    async function refreshData() {
        loadOrbitalStatus();
        if (visualizer) await visualizer.fetchData();
        showToast('🔄 Datos actualizados', 'info');
    }

    function startVisualizer() {
        const canvas = document.getElementById('orbitalCanvas');
        if (!canvas) return;
        if (visualizer) visualizer.stop();
        visualizer = new OrbitalVisualizer('orbitalCanvas');
        visualizer.start(2000);
        loadOrbitalStatus();
        showToast('▶️ Visualizador orbital iniciado', 'success');
    }

    function stopVisualizer() {
        if (visualizer) {
            visualizer.stop();
            visualizer = null;
        }
        showToast('⏹ Visualizador detenido', 'info');
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', () => {
        loadOrbitalStatus();
    });
    </script>
</body>
</html>
