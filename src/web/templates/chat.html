<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Workflow Determinista</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% include 'navbar.html' %}
    <main class="container">
        <div class="page-header"><h1>💬 Asistente Determinista</h1></div>

        <!-- Chat History -->
        <div class="chat-layout">
            <div id="chatHistory" class="chat-history"></div>

            <textarea id="chatInput" class="chat-input" placeholder="Describe lo que necesitas automatizar...&#10;&#10;Ej: 'Quiero que cuando un cliente nuevo se registre, se guarde en mi CRM y reciba un correo de bienvenida'" rows="5"></textarea>
            <button id="generateBtn" onclick="generateWorkflow()" class="btn btn-primary">🚀 Generar Workflow</button>
            <div id="chatResult" class="chat-result hidden"></div>
        </div>
    </main>
    <script src="/static/app.js"></script>
    <script>
    // Chat session history
    const chatSessionHistory = [];

    // Pre-fill from URL parameter
    (function() {
        const params = new URLSearchParams(window.location.search);
        const prefill = params.get('prefill');
        if (prefill) {
            document.getElementById('chatInput').value = prefill;
        }
    })();

    async function generateWorkflow() {
        const text = document.getElementById('chatInput').value.trim();
        if (!text) { showToast('Escribe una descripción primero', 'warning'); return; }

        const resultDiv = document.getElementById('chatResult');
        const btn = document.getElementById('generateBtn');

        // Show loading state
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Analizando...';
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `
            <div class="chat-processing">
                <div class="spinner-lg"></div>
                <p style="margin-top:12px">Analizando tu solicitud<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
            </div>
        `;

        try {
            const res = await fetch('/api/workflows/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text})
            });
            const data = await res.json();

            // Add to chat history
            chatSessionHistory.push({ user: text, result: data });

            if (data.suggestions && data.suggestions.length > 0) {
                let html = '<div class="suggestions-list">';
                data.suggestions.forEach((s, idx) => {
                    const stepsHtml = s.steps.map((step, si) => `
                        <div class="workflow-step">
                            <span class="step-num">${si + 1}</span>
                            <span class="step-name">${step.name || step.type || 'Paso'}</span>
                            <span class="step-params">${step.params ? Object.entries(step.params).map(([k,v]) => `${k}: ${v}`).join(', ') : ''}</span>
                        </div>
                    `).join('');

                    html += `
                        <div class="workflow-preview fade-in" data-suggestion-index="${idx}">
                            <h3>📌 ${s.template_name.replace(/_/g, ' ')}</h3>
                            <div class="wf-meta">
                                <span>🔁 Trigger: <strong>${s.trigger.type}</strong></span>
                                <span>📋 ${s.steps.length} pasos</span>
                                <span>🎯 Confianza: ${Math.round(s.confidence * 100)}%</span>
                            </div>
                            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">${s.description || 'Workflow generado automáticamente'}</p>
                            <div class="workflow-steps">${stepsHtml}</div>
                            <div class="workflow-actions">
                                <button onclick="editSuggestion(${idx})" class="btn btn-sm btn-secondary">✏️ Editar</button>
                                <button onclick="activateSuggestion(${idx})" class="btn btn-sm btn-success">✅ Activar</button>
                                <button onclick="discardSuggestion(this)" class="btn btn-sm btn-danger">❌ Descartar</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = `<div class="alert alert-warning fade-in">⚠️ ${data.message || 'No se encontraron workflows que coincidan. Intenta con otra descripción.'}</div>`;
            }

            renderChatHistory();
        } catch (e) {
            resultDiv.innerHTML = '<div class="alert alert-error fade-in">❌ Error de conexión. Intenta de nuevo.</div>';
            showToast('Error de conexión', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '🚀 Generar Workflow';
    }

    function renderChatHistory() {
        const historyDiv = document.getElementById('chatHistory');
        if (chatSessionHistory.length === 0) { historyDiv.innerHTML = ''; return; }
        historyDiv.innerHTML = chatSessionHistory.map((item, i) => `
            <div class="chat-history-item fade-in">
                <div class="history-user">💬 ${item.user.substring(0, 100)}${item.user.length > 100 ? '...' : ''}</div>
                <div class="history-result">${item.result.suggestions ? `📌 ${item.result.suggestions.length} sugerencia(s) encontrada(s)` : '⚠️ Sin resultados'}</div>
            </div>
        `).join('');
    }

    function getSuggestionData(index) {
        // Get the latest result's suggestions
        const lastEntry = chatSessionHistory[chatSessionHistory.length - 1];
        if (!lastEntry || !lastEntry.result.suggestions) return null;
        return lastEntry.result.suggestions[index];
    }

    async function editSuggestion(index) {
        const s = getSuggestionData(index);
        if (!s) return;
        // Create the workflow first, then redirect to editor
        try {
            const res = await fetch('/api/workflows', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: s.template_name.replace(/_/g, ' '),
                    description: s.description || '',
                    trigger_type: s.trigger.type || 'event',
                    trigger_config: s.trigger.config || {},
                    steps: s.steps || []
                })
            });
            const data = await res.json();
            if (res.ok && data.id) {
                showToast('Workflow creado, redirigiendo al editor...', 'success');
                window.location.href = `/editor?wf=${data.id}`;
            } else {
                showToast(data.error || 'Error al crear workflow', 'error');
            }
        } catch (e) {
            showToast('Error de conexión', 'error');
        }
    }

    async function activateSuggestion(index) {
        const s = getSuggestionData(index);
        if (!s) return;
        try {
            // Step 1: Create workflow
            const createRes = await fetch('/api/workflows', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: s.template_name.replace(/_/g, ' '),
                    description: s.description || '',
                    trigger_type: s.trigger.type || 'event',
                    trigger_config: s.trigger.config || {},
                    steps: s.steps || []
                })
            });
            const createData = await createRes.json();
            if (!createRes.ok || !createData.id) {
                showToast(createData.error || 'Error al crear workflow', 'error');
                return;
            }
            // Step 2: Activate it
            const activateRes = await fetch(`/api/workflows/${createData.id}/activate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });
            if (activateRes.ok) {
                showToast(`✅ Workflow "${s.template_name.replace(/_/g, ' ')}" activado correctamente`, 'success');
                // Update the preview card visually
                const cards = document.querySelectorAll('.workflow-preview');
                if (cards[index]) {
                    cards[index].style.borderColor = 'var(--success)';
                    const actionsDiv = cards[index].querySelector('.workflow-actions');
                    if (actionsDiv) {
                        actionsDiv.innerHTML = '<span class="status-badge active">🟢 Activo</span> <a href="/editor?wf=' + createData.id + '" class="btn btn-sm btn-secondary">✏️ Ver en editor</a>';
                    }
                }
            } else {
                showToast('Workflow creado pero no se pudo activar', 'warning');
            }
        } catch (e) {
            showToast('Error de conexión', 'error');
        }
    }

    function discardSuggestion(btn) {
        const card = btn.closest('.workflow-preview');
        if (card) {
            card.style.opacity = '0';
            card.style.transform = 'translateX(100%)';
            card.style.transition = 'all .3s ease';
            setTimeout(() => card.remove(), 300);
        }
        showToast('Sugerencia descartada', 'info');
    }
    </script>
</body>
</html>
