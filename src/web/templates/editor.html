<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor — Zenic-Flijo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% include 'navbar.html' %}
    <main class="container">
        <div class="page-header">
            <h1 id="editorTitle">✏️ Editor de Workflow</h1>
            <a href="/workflows" class="btn">← Volver</a>
        </div>

        <!-- Workflow Name -->
        <div class="editor-layout">
            <div class="form-group">
                <label for="wfNameInput">Nombre del Workflow</label>
                <input type="text" id="wfNameInput" placeholder="Ej: Notificar lead nuevo">
            </div>

            <!-- Trigger Section -->
            <div class="trigger-section">
                <h3 class="section-label">⚡ Disparador</h3>
                <div class="trigger-row">
                    <div class="form-group" style="flex:1">
                        <label for="triggerType">Tipo</label>
                        <select id="triggerType" onchange="onTriggerTypeChange()">
                            <option value="event">Evento</option>
                            <option value="schedule">Programado</option>
                            <option value="webhook">Webhook</option>
                            <option value="manual">Manual</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:2" id="triggerConfigGroup">
                        <label for="triggerConfig">Configuración</label>
                        <div id="triggerConfigContainer"></div>
                    </div>
                </div>
            </div>

            <!-- Steps Section -->
            <div class="section-label" style="margin-top:24px">
                <h3>🔄 Pasos del Workflow</h3>
            </div>
            <div id="stepsContainer" class="steps-flow"></div>
            <button onclick="addStep()" class="btn btn-secondary btn-full" style="margin-top:8px">+ Agregar paso</button>

            <!-- Action Buttons -->
            <div class="editor-actions">
                <button onclick="cancelEdit()" class="btn btn-danger">❌ Cancelar</button>
                <button onclick="testWorkflow()" class="btn btn-secondary">▶️ Probar</button>
                <button onclick="activateWorkflow()" class="btn btn-success" id="btnActivate" disabled>✅ Activar</button>
                <button onclick="saveWorkflow()" class="btn btn-primary">💾 Guardar</button>
            </div>

            <!-- Test Result -->
            <div id="testResult" class="test-result hidden"></div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script src="/static/editor.js"></script>
</body>
</html>
