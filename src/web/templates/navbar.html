<nav class="navbar">
    <div class="nav-inner">
        <a href="/dashboard" class="nav-brand">⚙️ WFD</a>
        <button id="navHamburger" class="nav-hamburger">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/workflows">📋 Workflows</a>
            <a href="/chat">💬 Chat</a>
            <a href="/settings">⚙️ Config</a>
        </div>
        <div class="nav-right">
            <span id="trialBadge" class="trial-badge-sm"></span>
            <button onclick="logout()" class="btn btn-sm">Cerrar sesión</button>
        </div>
    </div>
</nav>
<script>
async function logout() {
    await fetch('/api/auth/logout', {method: 'POST'});
    window.location.href = '/login';
}
fetch('/api/license/info').then(r=>r.json()).then(d=>{
    const badge = document.getElementById('trialBadge');
    if(d.is_trial) badge.textContent = `⏳ ${d.days_left || 30}d`;
    else if(d.type) { badge.textContent = `🔑 ${d.type}`; badge.className = 'license-badge-sm'; }
}).catch(()=>{});
</script>
