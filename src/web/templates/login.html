<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Determinista — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">⚙️</div>
                <h1>Workflow Determinista</h1>
                <p class="subtitle">Automatización offline para tu negocio</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div id="loginError" class="error-message hidden"></div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-full">Iniciar sesión</button>
            </form>
            <div class="trial-info" id="trialInfo">
                <div id="trialBadgeArea"></div>
                <div id="trialProgressArea"></div>
                <div id="trialActions" style="margin-top:12px;display:flex;flex-direction:column;gap:8px;align-items:center"></div>
            </div>
        </div>
    </div>
    <script>
        const trial = {{ trial|tojson }};
        (function initTrial() {
            const badgeArea = document.getElementById('trialBadgeArea');
            const progressArea = document.getElementById('trialProgressArea');
            const actionsArea = document.getElementById('trialActions');

            if (!trial) return;

            const isTrial = trial.is_trial || trial.status === 'trial';
            const daysLeft = trial.days_left || 0;
            const isExpired = trial.status === 'expired' || daysLeft <= 0;

            if (isTrial) {
                badgeArea.innerHTML = `<span class="trial-badge">⏳ Período de prueba</span>`;

                // Trial progress bar
                const totalDays = 30;
                const pct = Math.max(0, Math.min(100, ((totalDays - daysLeft) / totalDays) * 100));
                const cls = daysLeft <= 0 ? 'expired' : daysLeft <= 5 ? 'warning' : 'active';
                progressArea.innerHTML = `
                    <div class="trial-progress">
                        <div class="trial-progress-label">
                            <span>${isExpired ? 'Período de prueba expirado' : `${daysLeft} días restantes`}</span>
                            <span>${totalDays} días totales</span>
                        </div>
                        <div class="trial-progress-bar">
                            <div class="trial-progress-fill ${cls}" style="width:${pct}%"></div>
                        </div>
                    </div>
                `;

                // Comprar licencia button (shown when trial is active or expired)
                actionsArea.innerHTML = `
                    <a href="/settings#license" class="btn btn-sm btn-warning" style="text-decoration:none">🔑 Ingresar licencia</a>
                    <a href="https://workflowdeterminista.com/comprar" target="_blank" class="btn btn-sm btn-success" style="text-decoration:none">🛒 Comprar licencia</a>
                `;
            } else {
                // Licensed user
                badgeArea.innerHTML = `<span class="license-badge-sm">🔑 Licencia ${trial.type || 'activa'}</span>`;
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            // Reset and hide error
            errorEl.classList.add('hidden');
            errorEl.classList.remove('fade-in');

            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Iniciando sesión...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    const data = await res.json();
                    errorEl.textContent = data.error || 'Credenciales inválidas';
                    errorEl.classList.remove('hidden');
                    // Trigger fade-in animation
                    requestAnimationFrame(() => errorEl.classList.add('fade-in'));
                }
            } catch (err) {
                errorEl.textContent = 'Error de conexión al servidor';
                errorEl.classList.remove('hidden');
                requestAnimationFrame(() => errorEl.classList.add('fade-in'));
            }

            // Reset button
            btn.disabled = false;
            btn.innerHTML = 'Iniciar sesión';
        });
    </script>
</body>
</html>
