# Pre-commit hooks para Zenic-Flujo
# ================================
# Instalación:
#   pip install pre-commit
#   pre-commit install
#
# Hooks incluidos:
#   - forge-ledger-verify: verifica integridad de RunLedger en .forge/*/
#   - ruff (Python lint): gate lint_clean
#   - ruff-format (Python format): formato consistente
#   - mypy (Python types): gate types_clean (modo gradual)
#   - eslint (TS lint): gate lint_clean TS
#   - madge (TS circular): gate no_circular_imports TS
#   - any-ratchet (Python types): bloquea Any nuevos sin justificación (anti-deuda)
#
# Nota: Los hooks de ruff/mypy/eslint requieren las herramientas instaladas.
# Ver forge/docs/fase1-rollout.md y fase2-rollout.md para instalación.
# Ver docs/plans/any-ratchet-setup.md para el detalle del hook any-ratchet.

repos:
  # ── Forge Ledger Verify ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: forge-ledger-verify
        name: Forge Ledger Verify
        entry: python3 scripts/hooks/pre_commit_ledger.py
        language: system
        files: r'\.forge/.*run_ledger\.json$'
        pass_filenames: false
        always_run: true

  # ── Ruff (Python lint) ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^src/.*\.py$

  # ── Mypy (Python types) — modo gradual ─────────────────────────────
  # Solo verifica módulos en strict (core, orbital, hat.level1)
  - repo: local
    hooks:
      - id: mypy-gradual
        name: Mypy (gradual — strict en core/orbital/level1)
        entry: mypy --config-file mypy.ini --no-warn-unused-configs src/core src/orbital
        language: system
        files: ^src/(core|orbital)/.*\.py$
        pass_filenames: false

  # ── ESLint (TS lint) ───────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        entry: bash -c 'cd frontend && npx eslint . --max-warnings=0'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── Madge (TS circular imports) ────────────────────────────────────
  - repo: local
    hooks:
      - id: madge-circular
        name: Madge circular (frontend)
        entry: bash -c 'cd frontend && npx madge --circular --extensions ts,tsx src'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── Any Ratchet (anti-deuda Any) ───────────────────────────────────
  # Bloquea commits que introduzcan NUEVOS `Any` sin justificación en
  # archivos .py de src/ (excluye src/core/ y src/tests/). La deuda
  # existente se audita globalmente en CI (ver .github/workflows/any-audit.yml).
  # Bypass local: ANY_RATCHET_ALLOW=1 git commit ...
  # Bypass CI:    label `any-bypass` en el PR.
  # Doc: docs/plans/any-ratchet-setup.md
  - repo: local
    hooks:
      - id: any-ratchet
        name: Any Ratchet (bloquea Any nuevos sin justificación)
        entry: python3 scripts/hooks/pre_commit_any_ratchet.py
        language: system
        files: ^src/.*\.py$
        exclude: ^src/(core|tests)/.*
        pass_filenames: true

# Configuración global
default_language_version:
  python: python3.12
