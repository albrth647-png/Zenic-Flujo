apiVersion: v1
kind: Service
metadata:
  name: {{ include "zenic-flujo.fullname" . }}
  labels:
    {{- include "zenic-flujo.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: webhook
      port: {{ .Values.service.webhookPort }}
      targetPort: webhook
      protocol: TCP
  selector:
    {{- include "zenic-flujo.selectorLabels" . | nindent 4 }}
