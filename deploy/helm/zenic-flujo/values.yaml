# ═══════════════════════════════════════════════════════════
# Zenic-Flijo — Helm Values
# ═══════════════════════════════════════════════════════════

# ── Global ────────────────────────────────────────────────
global:
  imageRegistry: ""
  imagePullSecrets: []

# ── Replica count ─────────────────────────────────────────
replicaCount: 2

# ── Image ─────────────────────────────────────────────────
image:
  repository: ghcr.io/albrth647-png/zenic-flujo
  tag: latest
  pullPolicy: Always

# ── Service Account ───────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: "zenic-flujo"

# ── Pod Security ─────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

# ── Service ───────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080
  webhookPort: 8081
  annotations: {}

# ── Ingress ───────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    - host: app.zenic-flijo.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: zenic-flijo-tls
      hosts:
        - app.zenic-flijo.io

# ── Resources ─────────────────────────────────────────────
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

# ── Horizontal Pod Autoscaler ────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15

# ── Pod Disruption Budget ─────────────────────────────────
pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# ── Probes ────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/auth/status
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /api/auth/status
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/auth/status
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# ── Environment Variables ─────────────────────────────────
config:
  WFD_PRODUCTION: "true"
  WFD_WEB_HOST: "0.0.0.0"
  WFD_WEB_PORT: "8080"
  WFD_WEBHOOK_PORT: "8081"
  WFD_LOG_LEVEL: "INFO"
  WFD_DATA_DIR: "/app/data"
  WFD_OLLAMA_ENABLED: "false"
  WFD_OLLAMA_URL: "http://ollama:11434"
  WFD_OLLAMA_MODEL: "llama3.2"

# ── Secrets (override via --set or external secrets) ──────
secrets:
  WFD_SESSION_SECRET: ""
  WFD_LICENSE_SECRET: ""
  WFD_ENCRYPTION_MASTER_KEY: ""

# ─── External Services ────────────────────────────────────
externalServices:
  postgres:
    enabled: true
    host: "postgres-postgresql.database.svc.cluster.local"
    port: 5432
    database: "zenic_flijo"
    user: "zenic"
    existingSecret: "zenic-flujo-postgres"

  redis:
    enabled: true
    host: "redis-master.cache.svc.cluster.local"
    port: 6379
    existingSecret: "zenic-flujo-redis"

  mongodb:
    enabled: false
    uri: ""

# ── Prometheus ServiceMonitor ─────────────────────────────
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

# ── Network Policy ────────────────────────────────────────
networkPolicy:
  enabled: true
  ingressRules:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
  egressRules:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP

# ── Persistence ───────────────────────────────────────────
persistence:
  enabled: false
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 10Gi

# ── Node Selector & Tolerations ───────────────────────────
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - zenic-flujo
          topologyKey: kubernetes.io/hostname
