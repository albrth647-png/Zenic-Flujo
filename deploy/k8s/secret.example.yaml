# Fix Sprint 4 bug #62: rename a secret.example.yaml para evitar aplicar
# placeholders CHANGE-ME en producción. El Secret real debe generarse con
# secretGenerator en kustomization.yaml (ver abajo) o externalizarse a
# SealedSecrets / External Secrets Operator.
#
# Generar valores seguros:
#   WFD_SESSION_SECRET=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
#   WFD_LICENSE_SECRET=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
#   WFD_ENCRYPTION_MASTER_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
apiVersion: v1
kind: Secret
metadata:
  name: zenic-flujo-secrets
  namespace: zenic-flujo
  labels:
    app.kubernetes.io/name: zenic-flujo
type: Opaque
stringData:
  # ⚠️ CAMBIAR ANTES DE APLICAR — usar valores generados con secrets.token_urlsafe(48)
  WFD_SESSION_SECRET: "REPLACE-WITH-64-CHAR-MIN-RANDOM-STRING"
  WFD_LICENSE_SECRET: "REPLACE-WITH-64-CHAR-MIN-RANDOM-STRING"
  WFD_ENCRYPTION_MASTER_KEY: "REPLACE-WITH-64-CHAR-MIN-RANDOM-STRING"
