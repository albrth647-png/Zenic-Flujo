apiVersion: v1
kind: ConfigMap
metadata:
  name: zenic-flujo-config
  namespace: zenic-flujo
  labels:
    app.kubernetes.io/name: zenic-flujo
data:
  WFD_PRODUCTION: "true"
  WFD_WEB_HOST: "0.0.0.0"
  WFD_WEB_PORT: "8080"
  WFD_WEBHOOK_PORT: "8081"
  WFD_LOG_LEVEL: "INFO"
  WFD_DATA_DIR: "/app/data"
  WFD_OLLAMA_ENABLED: "false"
  WFD_POSTGRES_URL: "postgresql://$(PG_USER):$(PG_PASSWORD)@postgres-postgresql.database.svc.cluster.local:5432/zenic_flijo"
  WFD_REDIS_URL: "redis://redis-master.cache.svc.cluster.local:6379/0"
