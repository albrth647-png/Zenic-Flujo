# Zenic-Flijo — Nginx default config (dev/staging)
# Fix Sprint 4 bug #61: docker-compose.yml monta ./nginx/nginx.conf pero el
# directorio no existía, causando fallo al levantar el servicio nginx.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream zenic_backend {
        server zenic-flijo:8080;
        keepalive 32;
    }

    # BUG C-2: FastAPI v2 corre en el puerto 8000 dentro del mismo contenedor
    # zenic-flijo (arrancado por src/main.py:309 en un hilo). Antes nginx solo
    # proxyeaba a Flask:8080, así que las llamadas React a /api/v2/* caían en
    # el catch-all SPA de Flask y devolvían 404. Ahora /api/v2/ va a FastAPI.
    upstream zenic_fastapi {
        server zenic-flijo:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # FastAPI v2 — debe ir ANTES del location / para que tenga prioridad.
        # Proxy headers estándar + soporte para streaming (SSE futuras en v2).
        location /api/v2/ {
            proxy_pass http://zenic_fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # Proxy to Flask/FastAPI backend
        location / {
            proxy_pass http://zenic_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # WebSocket / SSE support
        location /ws {
            proxy_pass http://zenic_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        location /api/events/stream {
            proxy_pass http://zenic_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding on;
        }

        # Health check
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
