apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zenic-flijo.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "zenic-flijo.name" . }}
    helm.sh/chart: {{ include "zenic-flijo.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zenic-flijo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zenic-flijo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: web
              containerPort: {{ .Values.app.ports.web }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.app.ports.webhook }}
              protocol: TCP
          env:
            - name: WFD_LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: WFD_WEB_PORT
              value: "{{ .Values.config.webPort }}"
            - name: WFD_WEBHOOK_PORT
              value: "{{ .Values.config.webhookPort }}"
            - name: WFD_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenic-flijo.secretname" . }}
                  key: session-secret
            - name: WFD_ENCRYPTION_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenic-flijo.secretname" . }}
                  key: encryption-master-key
            # Fix Sprint 4 bug #66: WFD_DATABASE_URL y WFD_REDIS_URL eliminados aquí
            # (duplicados más abajo, después de las vars individuales que necesitan
            # para la sustitución $(VAR)). La versión correcta está tras las vars.
            - name: WFD_WEBHOOK_API_KEY_ENABLED
              value: "{{ .Values.config.webhookApiKeyEnabled }}"
            - name: WFD_ERROR_MAX_RETRIES
              value: "{{ .Values.config.errorMaxRetries }}"
            - name: WFD_ERROR_BASE_DELAY_SECONDS
              value: "{{ .Values.config.errorBaseDelaySeconds }}"
            - name: WFD_ERROR_RETRY_MULTIPLIER
              value: "{{ .Values.config.errorRetryMultiplier }}"
            - name: WFD_ERROR_USE_FALLBACK
              value: "{{ .Values.config.errorUseFallback }}"
            # Database and Redis individual vars (must be before URL vars)
            - name: WFD_POSTGRES_HOST
              value: {{ include "zenic-flijo.postgresHost" . | quote }}
            - name: WFD_POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: WFD_POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: WFD_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenic-flijo.postgresSecret" . }}
                  key: password
            - name: WFD_REDIS_HOST
              value: {{ include "zenic-flijo.redisHost" . | quote }}
            - name: WFD_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenic-flijo.redisSecret" . }}
                  key: redis-password
            # Connection URLs (uses env var substitution — must be AFTER individual vars)
            - name: WFD_DATABASE_URL
              value: "postgresql+psycopg://$(WFD_POSTGRES_USER):$(WFD_POSTGRES_PASSWORD)@$(WFD_POSTGRES_HOST):5432/$(WFD_POSTGRES_DB)"
            - name: WFD_REDIS_URL
              value: "redis://:$(WFD_REDIS_PASSWORD)@$(WFD_REDIS_HOST):6379/0"
            - name: WFD_OPENAI_ENABLED
              value: "{{ .Values.config.openaiEnabled | default \"false\" }}"
            - name: WFD_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenic-flijo.secretname" . }}
                  key: openai-api-key
                  optional: true
            - name: WFD_ANTHROPIC_ENABLED
              value: "{{ .Values.config.anthropicEnabled | default \"false\" }}"
            - name: WFD_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenic-flijo.secretname" . }}
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: {{ .Values.app.resources.requests.cpu }}
              memory: {{ .Values.app.resources.requests.memory }}
            limits:
              cpu: {{ .Values.app.resources.limits.cpu }}
              memory: {{ .Values.app.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: {{ .Values.app.livenessProbe.path }}
              port: web
            initialDelaySeconds: {{ .Values.app.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.app.readinessProbe.path }}
              port: web
            initialDelaySeconds: {{ .Values.app.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.readinessProbe.periodSeconds }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "zenic-flijo.fullname" . }}-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "zenic-flijo.fullname" . }}-pvc
  labels:
    app.kubernetes.io/name: {{ include "zenic-flijo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
