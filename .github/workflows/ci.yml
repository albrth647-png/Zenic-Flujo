# ═══════════════════════════════════════════════════════════
# Zenic-Flijo — CI/CD Pipeline
# Task IDs: 0-4, 0-7, 0-8
#
# Jobs: lint → test → build (main only) + security (parallel)
# ═══════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.8.0

      - name: Ruff check (lint rules)
        run: ruff check src/ --config=ruff.toml

      - name: Ruff format check
        run: ruff format src/ --check --config=ruff.toml

  # ── Test ─────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest src/tests/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            -v \
            --tb=short
        env:
          WFD_PRODUCTION: false
          WFD_SESSION_SECRET: REDACTED
          WFD_LICENSE_SECRET: REDACTED
          PYTHONPATH: .

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  # ── Build Docker Image ───────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: zenic-flijo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image runs
        run: |
          docker run --rm -d \
            --name zenic-test \
            -e WFD_SESSION_SECRET=REDACTED \
            -e WFD_LICENSE_SECRET=REDACTED \
            -p 8080:8080 \
            zenic-flijo:${{ github.sha }}
          sleep 5
          docker logs zenic-test || true
          docker stop zenic-test || true

      - name: Check image size
        run: |
          SIZE=$(docker image inspect zenic-flijo:${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 300 ]; then
            echo "::warning::Image size (${SIZE_MB}MB) exceeds 300MB target"
          fi

  # ── Security Audit ───────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --desc --ignore-vuln
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: pip-audit -r requirements.txt --desc
        continue-on-error: true
