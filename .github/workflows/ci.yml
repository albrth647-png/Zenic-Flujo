name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install -r requirements.txt pytest-cov bcrypt
      - name: Run tests
        run: python -m pytest src/tests/ --ignore=src/tests/test_ui_playwright.py -v --tb=short -q
      - name: Run benchmarks
        run: python -m src.orbital.benchmarks
