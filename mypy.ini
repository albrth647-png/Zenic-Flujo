[mypy]
python_version = 3.12
strict = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true

# Módulos core y orbital: STRICT
[mypy-src.core.*]
disallow_untyped_defs = true

[mypy-src.orbital.*]
disallow_untyped_defs = true

# HAT level0 y level1: STRICT
[mypy-src.hat.level1_orchestrator.*]
disallow_untyped_defs = true

[mypy-src.hat.bootstrap]
disallow_untyped_defs = true

# Nivel 4 tools: menos presión de tipos
[mypy-src.hat.level4_workers.*]
disallow_untyped_defs = false

[mypy-src.hat.level5_tools.*]
disallow_untyped_defs = false

# Tests: no strict
[mypy-src.tests.*]
disallow_untyped_defs = false
ignore_missing_imports = true

# Conectores y legacy: permisivo
[mypy-src.connectors.*]
disallow_untyped_defs = false

[mypy-src.agents.*]
disallow_untyped_defs = false

# Web/Flask: permisivo
[mypy-src.web.*]
disallow_untyped_defs = false

# API v2: permisivo por ahora
[mypy-src.api_v2.*]
disallow_untyped_defs = false